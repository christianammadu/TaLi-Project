        surface: 'new-session', icon: 'copy', disabled: false, needsPicker: 'subplan',
        standaloneForm: '/groundwork subplan --archetype {archetype} --topic "{topic}" --ref {ref}',
        seededForm: 'Scaffold a new groundwork sub-plan in `{plan_folder}` (plan title: {plan_title}).\n\nArchetype: {archetype} (one of: diff-plan, decision-doc, bug-doc). Topic: {topic}. Reference: {ref}.\n\nIf the groundwork skill is loaded in this session, follow its `subplan` action verbatim — read `.claude/skills/groundwork/actions/subplan.md`, resolve the next free `NN` number ≥ 06, render the matching template from `profiles/_shared/templates/subplans/{archetype}.md`, write to `{plan_folder}/NN-<slug>.md`, register in `.groundwork.json.subplans`, and cross-link from `00-README.md`. If the skill is not loaded, read the canonical reference instance for the archetype (`{plan_folder}/06-startSeededChat-extraction.md` for diff-plan, `07-spine-version-migration.md` for decision-doc, `08-index-board-fence-confusion.md` for bug-doc) and mirror its section shape with the new topic.\n\nDon\'t reuse a number already in use; don\'t write to 09 (reserved for orchestrate).' },
      { id: 'init',     label: 'Initialize plan', desc: 'Scaffold a new groundwork plan folder',
        surface: 'new-session', icon: 'spark', disabled: false, needsPicker: 'init',
        standaloneForm: '/groundwork init {target_folder} --profile {profile} --goal "{goal}"',
        seededForm: 'Scaffold a new groundwork plan folder at `{target_folder}`.\n\nProfile: {profile} (one of: software, general). Goal: {goal}.\n\nIf the groundwork skill is loaded in this session, follow its `init` action — read `.claude/skills/groundwork/actions/init.md`, run the discovery interview (skipping questions already answered above), and scaffold the spine. If the skill is not loaded, treat this as a plain instruction: create the folder, write the standard 6-doc spine (00-README through 05-tracking) plus an empty `.groundwork.json` anchored at `spine_version: "1"` with the profile and goal, and report back the file list.\n\nDo NOT scaffold outside `{target_folder}`. Preserve any existing files there as hand-authored.' },
    ];

    /* substituteAction — replace {plan_folder}/{plan_title}/{profile}/{goal}/etc against
       board-meta. Mirrors WP-20's substitution pattern. {plan_folder} falls back to
       'plans/groundwork' if the meta fence hasn't been refreshed with it yet. */
    function substituteAction(template, meta, dataPlan) {
      const plan = dataPlan || {};
      const fallbacks = {
        plan_folder:   meta.plan_folder   || 'plans/groundwork',
        plan_title:    meta.title         || plan.title || 'groundwork plan',
        plan_slug:     meta.plan_slug     || (meta.plan_folder ? String(meta.plan_folder).split('/').filter(Boolean).pop() : 'groundwork'),
        profile:       meta.profile       || plan.profile || 'software',
        goal:          meta.goal          || plan.goal    || '(no goal set)',
        phase:         meta.phase         || '(active phase)',
        archetype:     meta.archetype     || '<archetype>',
        topic:         meta.topic         || '<topic>',
        ref:           meta.ref           || '<ref>',
        target_folder: meta.target_folder || 'plans/<new-plan>/',
      };
      return String(template || '').replace(/\{(\w+)\}/g, (m, k) => (k in fallbacks ? fallbacks[k] : m));
    }

    /* ⌘K Command Palette (WP-21) — modal overlay listing the 9 actions.
       Keyboard: ↑/↓ navigate enabled rows · Enter fires · Esc closes.
       The component is pure-presentational; routing lives in App.onPaletteFire. */
    function CommandPalette({ open, onClose, onFire, actions }) {
      const [query, setQuery] = useState('');
      const [active, setActive] = useState(0);
      const inputRef = React.useRef(null);

      useEffect(() => {
        if (!open) return;
        setQuery('');
        setActive(0);
        const t = setTimeout(() => { if (inputRef.current) inputRef.current.focus(); }, 0);
        return () => clearTimeout(t);
      }, [open]);

      const filtered = useMemo(() => {
        const q = query.trim().toLowerCase();
        if (!q) return actions;
        return actions.filter(a =>
          a.id.toLowerCase().includes(q) ||
          a.label.toLowerCase().includes(q) ||
          (a.desc || '').toLowerCase().includes(q)
        );
      }, [query, actions]);

      const enabledIndices = useMemo(() => filtered.map((a, i) => a.disabled ? -1 : i).filter(i => i >= 0), [filtered]);

      useEffect(() => {
        if (!enabledIndices.length) { setActive(-1); return; }
        if (!enabledIndices.includes(active)) setActive(enabledIndices[0]);
      }, [enabledIndices]);

      if (!open) return null;

      const moveActive = (delta) => {
        if (!enabledIndices.length) return;
        const pos = enabledIndices.indexOf(active);
        const next = pos < 0 ? 0 : (pos + delta + enabledIndices.length) % enabledIndices.length;
        setActive(enabledIndices[next]);
      };

      const onKeyDown = (e) => {
        if (e.key === 'Escape') { e.preventDefault(); onClose(); return; }
        if (e.key === 'ArrowDown') { e.preventDefault(); moveActive(1); return; }
        if (e.key === 'ArrowUp')   { e.preventDefault(); moveActive(-1); return; }
        if (e.key === 'Enter') {
          e.preventDefault();
          const a = filtered[active];
          if (a && !a.disabled) onFire(a);
        }
      };

      const surfaceHint = (a) => {
        if (a.surface === 'new-session')    return { className: 'mint',   label: 'mint' };
        if (a.surface === 'active-session') return { className: 'attach', label: 'attach' };
        return { className: 'locked', label: 'WP-23' };
      };

      return (
        <div className="palette-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }} role="dialog" aria-label="Command palette" aria-modal="true">
          <div className="palette" onKeyDown={onKeyDown}>
            <div className="palette-search">
              <Icon name="search" size={14} />
              <input
                ref={inputRef}
                type="text" placeholder="Run a groundwork action…"
                value={query} onChange={(e) => setQuery(e.target.value)}
                aria-label="Filter actions"
              />
              <span className="palette-kbd">ESC</span>
            </div>
            <div className="palette-list" role="listbox" aria-label="Groundwork actions">
              {filtered.length === 0 && (
                <div style={{ padding: 'var(--space-3) var(--space-4)', color: 'var(--fg-faint)', fontSize: 'var(--text-body-sm)' }}>
                  No actions match "{query}".
                </div>
              )}
              {filtered.map((a, i) => {
                const hint = surfaceHint(a);
                return (
                  <button
                    key={a.id}
                    className={`palette-row${i === active ? ' is-active' : ''}`}
                    onClick={() => { if (!a.disabled) onFire(a); }}
                    onMouseEnter={() => { if (!a.disabled) setActive(i); }}
                    disabled={a.disabled}
                    title={a.disabled ? a.disabledReason : `${a.standaloneForm} · ${hint.label}`}
                    role="option" aria-selected={i === active} aria-disabled={a.disabled || false}
                  >
                    <span className="palette-row-icon"><Icon name={a.icon || 'circle'} size={14} /></span>
                    <span className="palette-row-body">
                      <span className="palette-row-label">{a.label}</span>
                      <span className="palette-row-desc">{a.disabled ? a.disabledReason : a.desc}</span>
                    </span>
                    <span className={`palette-row-hint ${hint.className}`}>{hint.label}</span>
                  </button>
                );
              })}
            </div>
            <div className="palette-foot">
              <span><kbd>↑</kbd><kbd>↓</kbd> navigate</span>
              <span><kbd>↵</kbd> run</span>
              <span><kbd>esc</kbd> close</span>
              <span style={{ marginLeft: 'auto' }}>read-actions attach · write-actions mint a new chat</span>
            </div>
          </div>
        </div>
      );
    }

    /* ─────── Argument-picker modals (WP-23) ───────
       Invoked from the palette for the two parameterized actions. Each picker
       collects the form values, then hands them back via onSubmit so the App
       can run the existing substituteAction + dispatch path. ESC closes; the
       backdrop reuses .palette-backdrop for visual continuity.

       SubplanPicker — archetype radio (3 options) + topic + optional ref.
         Archetype descriptions read from actions/subplan.md §"What it does".
       InitPicker    — target_folder + profile radio (2 options) + goal textarea.
         Profiles enumerated from .claude/skills/groundwork/profiles/* (software,
         general — `_shared` skipped; `content` is P3 stretch). */

    const SUBPLAN_ARCHETYPES = [
      { id: 'diff-plan',    label: 'diff-plan',    desc: 'Focused PR/change plan with file-by-file diff' },
      { id: 'decision-doc', label: 'decision-doc', desc: 'Between-round deliberation that doesn’t fit in a Round' },
      { id: 'bug-doc',      label: 'bug-doc',      desc: 'Postmortem-style root-cause + fix' },
    ];

    // Profiles enumerated from .claude/skills/groundwork/profiles/. `_shared` is
    // the base (not user-pickable). `content` is P3 stretch (not on disk yet).
    const INIT_PROFILES = [
      { id: 'software', label: 'software', desc: 'Code/feature work — produces designs' },
      { id: 'general',  label: 'general',  desc: 'Non-code, lean — no designs phase' },
    ];

    const REF_RE = /^(WP-\d+|§.+)$/;

    /* Shared modal shell — handles ESC/backdrop close, focus-on-mount, foot buttons.
       Children are the field rows; submit/cancel callbacks come from the caller. */
    function PickerShell({ title, subtitle, onClose, onSubmit, canSubmit, submitLabel, children, firstFieldRef }) {
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'Escape') { e.preventDefault(); onClose(); }
        };
        window.addEventListener('keydown', onKey);
        const t = setTimeout(() => { if (firstFieldRef && firstFieldRef.current) firstFieldRef.current.focus(); }, 0);
        return () => { window.removeEventListener('keydown', onKey); clearTimeout(t); };
      }, [onClose, firstFieldRef]);

      const onFormSubmit = (e) => {
        e.preventDefault();
        if (canSubmit) onSubmit();
      };

      return (
        <div
          className="palette-backdrop"
          onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}
          role="dialog"
          aria-label={title}
          aria-modal="true"
        >
          <form className="picker" onSubmit={onFormSubmit}>
            <div className="picker-head">
              <h2>{title}</h2>
              {subtitle && <span className="picker-sub">{subtitle}</span>}
            </div>
            <div className="picker-body">
              {children}
            </div>
            <div className="picker-foot">
              <span className="picker-help">⏎ submit · esc cancel</span>
              <span className="picker-spacer" />
              <button type="button" className="picker-btn" onClick={onClose}>Cancel</button>
              <button type="submit" className="picker-btn is-primary" disabled={!canSubmit}>
                {submitLabel || 'Submit'}
              </button>
            </div>
          </form>
        </div>
      );
    }

    function SubplanPicker({ onClose, onSubmit }) {
      const [archetype, setArchetype] = useState('diff-plan');
      const [topic, setTopic]         = useState('');
      const [ref, setRef]             = useState('');
      const topicRef = React.useRef(null);

      const topicOk = topic.trim().length > 0;
      const refTrim = ref.trim();
      const refWarn = refTrim.length > 0 && !REF_RE.test(refTrim);
      const canSubmit = topicOk; // ref-warn doesn't block submit per spec

      const submit = () => {
        if (!canSubmit) return;
        onSubmit({ archetype, topic: topic.trim(), ref: refTrim });
      };

      return (
        <PickerShell
          title="New sub-plan"
          subtitle="subplan · scaffolds NN-*.md"
          onClose={onClose}
          onSubmit={submit}
          canSubmit={canSubmit}
          submitLabel="Scaffold sub-plan"
          firstFieldRef={topicRef}
        >
          <div className="picker-field">
            <span className="picker-label">Archetype<span className="picker-req" aria-hidden="true">*</span></span>
            <div className="picker-seg" role="radiogroup" aria-label="Sub-plan archetype">
              {SUBPLAN_ARCHETYPES.map(a => (
                <button
                  key={a.id} type="button" role="radio" aria-checked={archetype === a.id}
                  className={archetype === a.id ? 'is-on' : ''}
                  onClick={() => setArchetype(a.id)}
                >
                  <span className="picker-seg-label">{a.label}</span>
                  <span className="picker-seg-desc">{a.desc}</span>
                </button>
              ))}
            </div>
          </div>

          <div className="picker-field">
            <label className="picker-label" htmlFor="picker-subplan-topic">
              Topic<span className="picker-req" aria-hidden="true">*</span>
            </label>
            <input
              id="picker-subplan-topic"
              ref={topicRef}
              className="picker-input"
              type="text"
              value={topic}
              onChange={(e) => setTopic(e.target.value)}
              placeholder="e.g. extract focused-pane resolver"
              required
            />
            <span className="picker-help">Becomes the file slug (kebab-cased automatically by the action).</span>
          </div>

          <div className="picker-field">
            <label className="picker-label" htmlFor="picker-subplan-ref">Ref (optional)</label>
            <input
              id="picker-subplan-ref"
              className="picker-input"
              type="text"
              value={ref}
              onChange={(e) => setRef(e.target.value)}
              placeholder='WP-22 or §Phase 4 (leave empty for cross-cutting)'
            />
            {refWarn
              ? <span className="picker-warn">Ref doesn’t match <code>WP-NN</code> or <code>§…</code> — submit anyway if intentional.</span>
              : <span className="picker-help">Cross-link target. WP-NN or §section, or empty.</span>
            }
          </div>
        </PickerShell>
      );
    }

    function InitPicker({ onClose, onSubmit }) {
      const [targetFolder, setTargetFolder] = useState('plans/');
      const [profile, setProfile]           = useState('software');
      const [goal, setGoal]                 = useState('');
      const folderRef = React.useRef(null);

      const folderTrim = targetFolder.trim();
      const folderOk   = folderTrim.length > 0 && folderTrim !== 'plans/';
      const folderWarn = folderOk && !folderTrim.startsWith('plans/');
      const goalOk     = goal.trim().length > 0;
      const canSubmit  = folderOk && goalOk;

      const submit = () => {
        if (!canSubmit) return;
        onSubmit({ target_folder: folderTrim.replace(/\/+$/, ''), profile, goal: goal.trim() });
      };

      return (
        <PickerShell
          title="Initialize plan"
          subtitle="init · scaffolds a groundwork spine"
          onClose={onClose}
          onSubmit={submit}
          canSubmit={canSubmit}
          submitLabel="Scaffold plan"
          firstFieldRef={folderRef}
        >
          <div className="picker-field">
            <label className="picker-label" htmlFor="picker-init-folder">
              Target folder<span className="picker-req" aria-hidden="true">*</span>
            </label>
            <input
              id="picker-init-folder"
              ref={folderRef}
              className="picker-input"
              type="text"
              value={targetFolder}
              onChange={(e) => setTargetFolder(e.target.value)}
              placeholder="plans/<new-plan-name>"
              required
            />
            {folderWarn
              ? <span className="picker-warn">Doesn’t start with <code>plans/</code> — submit anyway if intentional.</span>
              : <span className="picker-help">Path the spine will be scaffolded into.</span>
            }
          </div>

          <div className="picker-field">
            <span className="picker-label">Profile<span className="picker-req" aria-hidden="true">*</span></span>
            <div className="picker-seg" role="radiogroup" aria-label="Plan profile">
              {INIT_PROFILES.map(p => (
                <button
                  key={p.id} type="button" role="radio" aria-checked={profile === p.id}
                  className={profile === p.id ? 'is-on' : ''}
                  onClick={() => setProfile(p.id)}
                >
                  <span className="picker-seg-label">{p.label}</span>
                  <span className="picker-seg-desc">{p.desc}</span>
                </button>
              ))}
            </div>
          </div>

          <div className="picker-field">
            <label className="picker-label" htmlFor="picker-init-goal">
              Goal<span className="picker-req" aria-hidden="true">*</span>
            </label>
            <textarea
              id="picker-init-goal"
              className="picker-textarea"
              rows={3}
              value={goal}
              onChange={(e) => setGoal(e.target.value)}
              placeholder="One-sentence description of what this plan ships."
              required
            />
          </div>
        </PickerShell>
      );
    }

    function Toast({ msg }) {
      if (!msg) return null;
      return <div className="toast">{msg}</div>;
    }

    /* ─────── Page head — title + goal + gate banner + layout toggle ───────
       The layout toggle (Mission Control ↔ Wave Board) lives in the page-head
       top-right cluster alongside the host badge + package count. No separate
       sticky controls bar — the page-head IS the chrome. Theme / mode / density
       are NEVER switchable here; the shell pushes them via host-context. */
    function PageHead({ data, meta, filter, setFilter, counts, layout, setLayout, inShell, done, onKickoff, onOpenPalette }) {
      const planTitle = meta.title || data.plan?.title || 'this plan';
      const kickoffHint = inShell
        ? 'Spawns the orchestrator agent · mirrors WPs to Tasks · drives waves to completion.'
        : 'Outside Ikenga — copies the orchestrator brief to your clipboard.';
      // Round-8 density wins:
      //  - slim Kickoff once orchestrate has fired at least once (meta.orchestrated_at)
      //  - gates collapsed to a summary chip by default; click expands.
      const hasOrchestrated = !!meta.orchestrated_at;
      const [gatesExpanded, setGatesExpanded] = React.useState(false);
      const gates = data.gates || [];
      const gatesPassed = gates.filter(g => g.status === 'passed').length;
      const gatesCancelled = gates.filter(g => g.status === 'cancelled').length;
      return (
        <header className="page-head">
          <div className="page-head-top">
            <div className="page-head-titles">
              <span className="eyebrow"><span className="eyebrow-dot"></span>groundwork · plan board</span>
              <h1 className="plan-title">{meta.title || data.plan?.title || 'groundwork plan'}{' '}<em>· {(meta.profile || data.plan?.profile || 'software')}</em></h1>
              {(data.plan?.goal || meta.goal) && <p className="plan-goal">{data.plan?.goal || meta.goal}</p>}
            </div>
            <div className="page-head-actions">
              <button
                className="btn btn-run"
                onClick={onOpenPalette}
                title="Open the groundwork command palette (⌘K / Ctrl-K)"
                aria-label="Run a groundwork action"
              >
                <Icon name="bolt" size={12} /> Run<span aria-hidden="true">…</span>
                <span className="palette-kbd" aria-hidden="true">⌘K</span>
              </button>
              <div className="seg seg-sm" role="tablist" aria-label="Board layout">
                <button className={layout === 'mission-control' ? 'is-on' : ''} onClick={() => setLayout('mission-control')} title="Mission Control — dense WP table + cross-cutting rail">
                  <Icon name="table" size={12} /> Mission Control
                </button>
                <button className={layout === 'kanban' ? 'is-on' : ''} onClick={() => setLayout('kanban')} title="Kanban — columns by status (Queued · In Progress · Blocked · Done)">
                  <Icon name="columns" size={12} /> Kanban
                </button>
                <button className={layout === 'dag-hierarchical' ? 'is-on' : ''} onClick={() => setLayout('dag-hierarchical')} title="DAG — hierarchical dependency graph; gates as choke-point nodes; drag to pan">
                  <Icon name="git-fork" size={12} /> DAG
                </button>
              </div>
              <div className="seg seg-sm">
                <button onClick={() => location.reload()} title="Reload the board from disk (picks up a refresh-board run)" aria-label="Reload board">
                  <Icon name="refresh" size={12} />
                </button>
              </div>
              <span className={`host-badge ${inShell ? 'in-shell' : ''} ${USING_MOCK ? 'mock' : ''}`}>
                {inShell ? 'in shell' : 'standalone'}{USING_MOCK && ' · mock'}
              </span>
              <span className="page-head-counts mono">
                <strong>{done}</strong> / {data.wps.length} done
              </span>
            </div>
          </div>

          {/* Kickoff (WP-20) — full card on cold boards (no orchestrate.last_run);
              slim button once orchestrate has fired at least once. Round 8 density. */}
          {hasOrchestrated ? (
            <button
              type="button"
              className="kickoff-compact"
              onClick={onKickoff}
              title={inShell ? 'Re-spawn the orchestrator agent for the whole plan' : 'Copy orchestrator brief to clipboard'}
              aria-label={`Re-kickoff orchestrator for ${planTitle}`}
            >
              <span className="kickoff-compact-glyph"><Icon name="play" size={11} /></span>
              <span>Re-kickoff</span>
              <span className="kickoff-compact-when">last run {meta.orchestrated_at}</span>
            </button>
          ) : (
            <button
              type="button"
              className="kickoff"
              onClick={onKickoff}
              title={inShell ? 'Spawn the orchestrator agent for the whole plan' : 'Copy orchestrator brief to clipboard'}
              aria-label={`Kickoff orchestrator for ${planTitle}`}
            >
              <span className="kickoff-glyph"><Icon name="play" size={14} /></span>
              <span className="kickoff-body">
                <span className="kickoff-eyebrow">Kickoff</span>
                <span className="kickoff-title">Spawn the orchestrator for {planTitle}</span>
                <span className="kickoff-hint">{kickoffHint}</span>
              </span>
              <span className="kickoff-mode">{inShell ? 'send to your chi' : 'copy brief'}</span>
            </button>
          )}

          {/* Freeze gates — collapsed to a summary chip by default; click expands.
              Round 8: saves ~110px of vertical real estate on warm boards. */}
          {!gatesExpanded ? (
            <div style={{ display: 'flex', alignItems: 'center', gap: 'var(--space-3)' }}>
              <button
                type="button"
                className="gates-summary"
                onClick={() => setGatesExpanded(true)}
                title="Show every freeze gate"
                aria-expanded="false"
              >
                <span className="gates-summary-caret">▸</span>
                <strong>{gatesPassed}/{gates.length - gatesCancelled}</strong> gates passed
                {gatesCancelled > 0 && <span> · {gatesCancelled} cancelled</span>}
              </button>
              <div className="filters">
                {FILTERS.map(f => (
                  <button key={f} className={`filter-chip ${filter === f ? 'is-on' : ''}`} onClick={() => setFilter(f)}>
                    {f.replace('_', ' ')}
                    {f !== 'all' && counts[f] ? <span className="filter-chip-count">{counts[f]}</span> : null}
                  </button>
                ))}
              </div>
            </div>
          ) : (
            <div className="gates">
              <button
                type="button"
                className="gates-summary"
                onClick={() => setGatesExpanded(false)}
                title="Collapse"
                style={{ marginRight: 'var(--space-2)', marginTop: 0 }}
                aria-expanded="true"
              >
                <span className="gates-summary-caret">▾</span> freeze gates
              </button>
              {gates.map(g => (
                <span key={g.id} className={`gate ${g.status === 'passed' ? 'passed' : ''}`} title={`${g.label} (${g.wp})`}>
                  {g.status === 'passed' ? <Icon name="check" size={11} /> : <Icon name="circle" size={9} />}
                  <span>{g.id}</span>
                  <span style={{ color: 'currentColor', opacity: .6 }}>· {g.label}</span>
                </span>
              ))}
              <div className="filters">
                {FILTERS.map(f => (
                  <button key={f} className={`filter-chip ${filter === f ? 'is-on' : ''}`} onClick={() => setFilter(f)}>
                    {f.replace('_', ' ')}
                    {f !== 'all' && counts[f] ? <span className="filter-chip-count">{counts[f]}</span> : null}
                  </button>
                ))}
              </div>
            </div>
          )}
        </header>
      );
    }

    /* ─────── WP detail card — the rail's top section ───────
       Populated when a WP is selected; shows a placeholder otherwise. The
       brief renders in a scrollable mono <pre> so the user can select-and-
       copy partial text. Action buttons (Copy / Start) live at the bottom;
       hidden entirely when status === 'done', matching the table + kanban. */
    function WpDetailCard({ wp, subplan, onCopy, onStart, onClear, inShell }) {
      if (!wp) {
        return (
          <section className="detail-card detail-card-empty">
            <span className="eyebrow">
              <span className="eyebrow-dot" style={{ background: 'var(--fg-faint)' }}></span>
              nothing selected
            </span>
            <p className="detail-empty-text">
              Click a row or card to see its full brief here. The brief is what you'd paste into a session.
            </p>
          </section>
        );
      }
      const status = STATUS_LABEL[wp.status] || wp.status;
      const repoClass = REPO_TAG_CLASS[wp.repo] || '';
      const briefText = wp.brief || `WP ${wp.id} — ${wp.title}\nRepo / scope: ${wp.repo || 'unspecified'}\nDepends on: ${(wp.deps||[]).join(', ') || 'none'}\n\nRead the full brief in 09-orchestration.md §${wp.id}.`;
      return (
        <section className="detail-card detail-card-selected">
          <div className="detail-head">
            <span className="eyebrow"><span className="eyebrow-dot"></span>selected</span>
            <button className="detail-clear" onClick={onClear} title="Clear selection" aria-label="Clear selection">×</button>
          </div>
          <div className="detail-id-line">
            <span className="mono detail-id">{wp.id}</span>
            <span className="mono detail-wave">wave {wp.wave}</span>
            <span className="wp-status-cell"><span className={`dot ${wp.status}`}></span>{status}</span>
          </div>
          <h3 className="detail-title">{wp.title}</h3>
          <div className="detail-tags">
            <span className={`tag ${repoClass}`}>{wp.repo || '—'}</span>
            {wp.gate && <span className="tag tag-deal">◆ {wp.gate}</span>}
          </div>
          <div className="detail-deps">
            <span className="detail-label">needs</span>
            <span className="detail-value mono">{(wp.deps || []).join(' · ') || '—'}</span>
          </div>
          {subplan && (
            <div className="detail-subplan">
              <span className="detail-label">sub-plan</span>
              <span className="detail-value">
                <a href={`../${subplan.path}`} target="_top" title={subplan.archetype}>{subplan.path}</a>
              </span>
            </div>
          )}
          <div className="detail-brief-label">Brief</div>
          <pre className="detail-brief">{briefText}</pre>
          {wp.status !== 'done' && (
            <div className="detail-actions">
              <button className="btn" onClick={() => onCopy(wp)}><Icon name="copy" size={11} /> Copy brief</button>
              <button className="btn is-primary" onClick={() => onStart(wp)} title={inShell ? "Send this WP's brief to your Chi" : 'Copy-prompt path'}><Icon name="play" size={10} /> Start</button>
            </div>
          )}
        </section>
      );
    }

    /* ─────── PaneRail — shared right-side context column ───────
       Identical across Mission Control + Kanban. Detail card on top (the
       currently-selected WP or a placeholder); persistent cross-cutting
       state below (decisions log · design coverage · research stamps).
       Nothing here hides/blurs/disables the main content. */
    function PaneRail({ data, selectedWp, subplan, onCopy, onStart, onClear, inShell }) {
      return (
        <aside className="rail">
          <div className="rail-sticky">
          <WpDetailCard
            wp={selectedWp} subplan={subplan}
            onCopy={onCopy} onStart={onStart} onClear={onClear}
            inShell={inShell}
          />
          {data.decisions && data.decisions.length > 0 && (
            <section className="detail-card">
              <span className="detail-card-label">Decisions log</span>
              {data.decisions.map(d => (
                <div key={`${d.round}-${d.n}`} className="decision-row">
                  <div className="decision-row-head">Round {d.round} · {d.n} decision{d.n === 1 ? '' : 's'}</div>
                  <div className="decision-row-note">{d.note}</div>
                </div>
              ))}
            </section>
          )}
          {data.subplans && data.subplans.length > 0 && (
            <section className="detail-card">
              <span className="detail-card-label">Sub-plans</span>
              {data.subplans.map(sp => (
                <div key={sp.path} className="subplan-row">
                  <a href={`../${sp.path}`} target="_top" className="subplan-row-link" title={sp.archetype}>{sp.path}</a>
                  <div className="subplan-row-meta">
                    <span className="subplan-tag">{sp.archetype}</span>
                    {sp.ref
                      ? <span className="subplan-ref mono">{sp.ref}</span>
                      : <span className="subplan-ref subplan-ref-cross">cross-cutting</span>}
                    {sp.status && sp.status !== 'active' && <span className="subplan-status">{sp.status}</span>}
                  </div>
                </div>
              ))}
            </section>
          )}
          {data.coverage && data.coverage.length > 0 && (
            <section className="detail-card">
              <span className="detail-card-label">Design coverage</span>
              {data.coverage.map(c => (
                <div key={c.phase} className="coverage-row">
                  <span className="phase-tag">{c.phase}</span>
                  <span className={`phase-count ${c.ok ? 'ok' : 'warn'}`}>{c.designs}/{c.of} {c.ok ? '✓' : '⚠'}</span>
                </div>
              ))}
              <div style={{ fontSize: 10, color: 'var(--fg-faint)', marginTop: 8, lineHeight: 1.4 }}>
                Designs are produced per phase as approached.
              </div>
            </section>
          )}
          {data.research && (
            <section className="detail-card">
              <span className="detail-card-label">Research</span>
              <div style={{ fontSize: 'var(--text-body-sm)', color: 'var(--fg-muted)', display: 'flex', flexDirection: 'column', gap: 4 }}>
                <div>02 stamped <span className="mono" style={{ color: 'var(--fg-faint)' }}>{data.research.external_stamped || 'n/a'}</span></div>
                <div>03 stamped <span className="mono" style={{ color: 'var(--fg-faint)' }}>{data.research.internal_stamped || 'n/a'}</span></div>
              </div>
            </section>
          )}
          </div>
        </aside>
      );
    }

    /* ─────── Mission Control ─────── */
    function MissionControl({ data, selected, setSelected, selectedWp, subplan, filter, onCopy, onStart, onClear, inShell }) {
      const rows = useMemo(() => filter === 'all' ? data.wps : data.wps.filter(w => w.status === filter), [filter, data.wps]);

      return (
        <div className="board-grid">
          {/* Table column — no per-section overflow; the App-level
              <main.scroll-area> is the single scroller. The thead's
              position:sticky;top:0 pins to that container. */}
          <div>
            <table className="wp-table">
              <thead>
                <tr>
                  <th>WP</th>
                  <th>Title</th>
                  <th>Scope</th>
                  <th style={{ textAlign: 'center' }}>Wave</th>
                  <th>Needs</th>
                  <th>Status</th>
                  <th style={{ textAlign: 'right' }}>Actions</th>
                </tr>
              </thead>
              <tbody>
                {rows.map(wp => (
                  <tr key={wp.id} className={selected === wp.id ? 'is-selected' : ''} onClick={() => setSelected(wp.id)}>
                    <td className="wp-cell-id">{wp.id}{wp.gate && <span className="gate-mark" title={wp.gate}>◆</span>}</td>
                    <td>{wp.title}</td>
                    <td><span className={`tag ${REPO_TAG_CLASS[wp.repo] || ''}`}>{wp.repo || '—'}</span></td>
                    <td className="wp-cell-wave">{wp.wave}</td>
                    <td className="wp-cell-deps">{(wp.deps || []).join(' · ') || '—'}</td>
                    <td><span className="wp-status-cell"><span className={`dot ${wp.status}`}></span>{STATUS_LABEL[wp.status]}</span></td>
                    <td style={{ textAlign: 'right' }}>
                      {wp.status !== 'done' && (
                        <span className="wp-actions">
                          <button className="btn btn-sm" onClick={(e) => { e.stopPropagation(); onCopy(wp); }}><Icon name="copy" size={11} /> Copy</button>
                          <button className="btn btn-sm is-primary" onClick={(e) => { e.stopPropagation(); onStart(wp); }} title={inShell ? "Send this WP's brief to your Chi" : 'Copy-prompt path'}><Icon name="play" size={10} /> Start</button>
                        </span>
                      )}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <PaneRail
            data={data} selectedWp={selectedWp} subplan={subplan}
            onCopy={onCopy} onStart={onStart} onClear={onClear}
            inShell={inShell}
          />
        </div>
      );
    }

    /* ─────── Kanban — columns by status (was Wave Board) ───────
       Columns are workflow-ordered: Queued → In Progress → Blocked → Done.
       Wave is preserved as per-card metadata (cards retain their wave info
       at the bottom). Done-column cards omit the Copy/Start actions row,
       matching the "actions blank for done" rule in Mission Control. */
    const STATUS_COLUMNS = [
      { id: 'queued',      label: 'Queued',      sub: 'next up' },
      { id: 'in_progress', label: 'In Progress', sub: 'active' },
      { id: 'blocked',     label: 'Blocked',     sub: 'gated · needs attention' },
      { id: 'done',        label: 'Done',        sub: 'shipped · history' },
    ];

    function Kanban({ data, selected, setSelected, selectedWp, subplan, onCopy, onStart, onClear, inShell }) {
      const colsWithCards = STATUS_COLUMNS.map(col => ({
        ...col,
        cards: data.wps.filter(w => w.status === col.id),
      }));
      return (
        <div className="board-grid">
          <div className="kanban-strip">
            {colsWithCards.map(col => (
            <div key={col.id} className={`kanban-col status-${col.id}`}>
              <div className="kanban-col-head">
                <div className="kanban-col-title">
                  <span className={`dot ${col.id}`}></span>
                  <span className="kanban-col-label">{col.label}</span>
                  <span className="kanban-col-count">{col.cards.length}</span>
                </div>
                <div className="kanban-col-sub">{col.sub}</div>
              </div>
              <div className="kanban-col-body">
                {col.cards.length === 0 ? (
                  <div className="kanban-col-empty">—</div>
                ) : col.cards.map(wp => (
                  <button key={wp.id} className={`wp-card ${selected === wp.id ? 'is-selected' : ''}`} onClick={() => setSelected(wp.id)}>
                    <div className="wp-card-row">
                      <span className="mono" style={{ fontSize: 'var(--text-micro)', color: 'var(--fg-muted)' }}>{wp.id}</span>
                      <span className="mono" style={{ fontSize: 'var(--text-micro)', color: 'var(--fg-faint)' }}>wave {wp.wave}</span>
                    </div>
                    <div className="wp-card-title">{wp.title}</div>
                    <div style={{ display: 'flex', gap: 6, marginTop: 8, flexWrap: 'wrap' }}>
                      <span className={`tag ${REPO_TAG_CLASS[wp.repo] || ''}`}>{wp.repo || '—'}</span>
                      {wp.gate && <span className="tag tag-deal">◆ {wp.gate}</span>}
                    </div>
                    {(wp.deps || []).length > 0 && (
                      <div className="wp-card-meta">needs: {wp.deps.join(' · ')}</div>
                    )}
                    {wp.status !== 'done' && (
                      <div className="wp-card-actions">
                        <span className="btn btn-sm" onClick={(e) => { e.stopPropagation(); onCopy(wp); }}><Icon name="copy" size={10} /> Copy brief</span>
                        <span className="btn btn-sm is-primary" onClick={(e) => { e.stopPropagation(); onStart(wp); }}><Icon name="play" size={9} /> Start</span>
                      </div>
                    )}
                  </button>
                ))}
              </div>
            </div>
          ))}
          </div>
          <PaneRail
            data={data} selectedWp={selectedWp} subplan={subplan}
            onCopy={onCopy} onStart={onStart} onClear={onClear}
            inShell={inShell}
          />
        </div>
      );
    }

    /* ─────── DAG Hierarchical (C1, D-03 · Round 10–12) ───────
       L→R hierarchical DAG. WPs in wave columns; gates in dedicated between-wave
       columns. Edges color-coded by source-node status. Drag-to-pan; click-empty
       / Esc / ✕ / click-selected-again to deselect. When a node is selected,
       the non-neighbor subgraph fades for clarity. */
    const C1_NODE_W = 180, C1_GATE_W = 168, C1_NODE_H = 68, C1_V_GAP = 28;
    const C1_ROW_STEP = C1_NODE_H + C1_V_GAP;        // 96
    const C1_COL_STEP = 280;
    const C1_BASE_X   = 80;
    const C1_BASE_Y   = 48;
    const C1_STATUS_BADGE = { done: 'DONE', in_progress: 'ACTIVE', queued: 'QUEUED', blocked: 'BLOCKED', stretch: 'STRETCH', superseded: 'RETIRED' };
    const C1_GATE_GLYPH  = { passed: '✓', pending: '◌', cancelled: '✕' };

    /** Auto-layout: place WPs in wave columns; gates in synthetic columns
     *  inserted after the wave that owns them. Returns positions, column
     *  labels, and canvas dimensions for any plan shape. */
    function computeC1Layout(wps, gates) {
      const waves = [...new Set(wps.map(w => (w.wave ?? 0)))].sort((a, b) => a - b);
      const gatesByWave = {};
      for (const g of gates) {
        const owner = wps.find(w => w.id === g.wp);
        const ownerWave = owner ? (owner.wave ?? 0) : (waves[0] ?? 0);
        (gatesByWave[ownerWave] = gatesByWave[ownerWave] || []).push(g);
      }

      const positions = {};
      const cols      = [];
      let x = C1_BASE_X;

      for (const w of waves) {
        cols.push({ x, label: `wave ${w}`, kind: 'wave' });
        const wpsInWave = wps.filter(wp => (wp.wave ?? 0) === w);
        wpsInWave.forEach((wp, i) => { positions[wp.id] = { x, y: C1_BASE_Y + i * C1_ROW_STEP, kind: 'wp' }; });
        x += C1_COL_STEP;
        if (gatesByWave[w] && gatesByWave[w].length) {
          cols.push({ x, label: `gates · ${w}→${w + 1}`, kind: 'gates' });
          gatesByWave[w].forEach((g, i) => { positions[g.id] = { x, y: C1_BASE_Y + i * C1_ROW_STEP, kind: 'gate' }; });
          x += C1_COL_STEP;
        }
      }

      const tallest = Math.max(
        0,
        ...waves.map(w => wps.filter(wp => (wp.wave ?? 0) === w).length),
        ...Object.values(gatesByWave).map(arr => arr.length)
      );
      const canvasWidth  = Math.max(1200, x + 80);
      const canvasHeight = Math.max(560,  C1_BASE_Y + tallest * C1_ROW_STEP + 80);
      return { positions, cols, canvasWidth, canvasHeight };
    }

    function DagHierarchical({ data, selected, setSelected, selectedWp, subplan, onCopy, onStart, onClear, inShell }) {
      const canvasRef = useRef(null);
      const wps   = data.wps   || [];
      const gates = data.gates || [];
      const layout = useMemo(() => computeC1Layout(wps, gates), [wps, gates]);

      useEffect(() => {
        const el = canvasRef.current; if (!el) return;
        let dragging = false, moved = false, startX = 0, startY = 0, scrollX = 0, scrollY = 0;
        const onDown = (e) => {
          if (e.button !== 0) return;
          if (e.target.closest('.dag-c1-node, .btn, .dag-c1-detail')) return;
          dragging = true; moved = false;
          startX = e.clientX; startY = e.clientY;
          scrollX = el.scrollLeft; scrollY = el.scrollTop;
          e.preventDefault();
        };
        const onMove = (e) => {
          if (!dragging) return;
          const dx = e.clientX - startX, dy = e.clientY - startY;
          if (!moved && Math.hypot(dx, dy) > 5) { moved = true; el.classList.add('is-panning'); }
          if (moved) { el.scrollLeft = scrollX - dx; el.scrollTop = scrollY - dy; }
        };
        const onUp = (e) => {
          if (!dragging) return;
          const wasPan = moved;
          dragging = false; moved = false;
          el.classList.remove('is-panning');
          if (!wasPan && !e.target.closest('.dag-c1-node, .btn, .dag-c1-detail')) setSelected(null);
        };
        const onWheel = (e) => { if (e.shiftKey) { e.preventDefault(); el.scrollLeft += e.deltaY; } };
        const onKey = (e) => { if (e.key === 'Escape') setSelected(null); };
        el.addEventListener('mousedown', onDown);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
        el.addEventListener('wheel', onWheel, { passive: false });
        window.addEventListener('keydown', onKey);
        return () => {
          el.removeEventListener('mousedown', onDown);
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
          el.removeEventListener('wheel', onWheel);
          window.removeEventListener('keydown', onKey);
        };
      }, [setSelected]);

      const statusOf = (id) => {
        const w = wps.find(x => x.id === id); if (w) return w.status;
        const g = gates.find(x => x.id === id); if (g) return g.status;
        return 'queued';
      };
      const mkPath = (from, to) => {
        const fromW = from.kind === 'gate' ? C1_GATE_W : C1_NODE_W;
        const x1 = from.x + fromW, y1 = from.y + C1_NODE_H / 2;
        const x2 = to.x,           y2 = to.y   + C1_NODE_H / 2;
        const dx = Math.max(40, (x2 - x1) * 0.45);
        return `M${x1},${y1} C${x1 + dx},${y1} ${x2 - dx},${y2} ${x2},${y2}`;
      };

      const edges = useMemo(() => {
        const out = [];
        for (const wp of wps) {
          for (const dep of (wp.deps || [])) {
            const from = layout.positions[dep], to = layout.positions[wp.id];
            if (!from || !to) continue;
            out.push({ id: `${dep}->${wp.id}`, d: mkPath(from, to), isGate: from.kind === 'gate', fromStatus: statusOf(dep), selectedHit: selected === wp.id || selected === dep });
          }
        }
        for (const g of gates) {
          const from = layout.positions[g.wp], to = layout.positions[g.id];
          if (!from || !to) continue;
          out.push({ id: `${g.wp}->${g.id}`, d: mkPath(from, to), isGate: true, fromStatus: statusOf(g.wp), selectedHit: selected === g.id || selected === g.wp });
        }
        return out;
      }, [wps, gates, layout, selected]);

      const neighborSet = useMemo(() => {
        if (!selected) return new Set();
        const ns = new Set([selected]);
        const wp = wps.find(w => w.id === selected);
        if (wp) {
          (wp.deps || []).forEach(d => ns.add(d));
          const owned = gates.find(g => g.wp === selected);
          if (owned) ns.add(owned.id);
        }
        const g = gates.find(g => g.id === selected);
        if (g) ns.add(g.wp);
        wps.forEach(w => { if ((w.deps || []).includes(selected)) ns.add(w.id); });
        return ns;
      }, [selected, wps, gates]);
      const hasFocus = !!selected;

      const selWp   = wps.find(w => w.id === selected);
      const selGate = gates.find(g => g.id === selected);
      const selNode = selWp ? { ...selWp, kind: 'wp' } : selGate ? { ...selGate, kind: 'gate' } : null;

      return (
        <div className={`dag-c1-canvas ${hasFocus ? 'has-focus' : ''}`} ref={canvasRef}>
          <div className="dag-c1-inner" style={{ minWidth: layout.canvasWidth, minHeight: layout.canvasHeight }}>
            <div className="dag-c1-legend">
              <span><i className="swatch"/>WP &rarr; WP</span>
              <span><i className="swatch dashed"/>through-gate</span>
              <span className="pan-hint">drag to pan &middot; shift-wheel &harr; &middot; Esc deselects</span>
            </div>

            {layout.cols.map((c, i) => {
              const center = c.x + (c.kind === 'gates' ? C1_GATE_W : C1_NODE_W) / 2;
              return (
                <React.Fragment key={`col-${i}`}>
                  <div className={`dag-c1-col-rule ${c.kind === 'gates' ? 'gates' : ''}`} style={{ left: center }} />
                  <div className={`dag-c1-col-label ${c.kind === 'gates' ? 'gates' : ''}`} style={{ left: c.x }}>{c.label}</div>
                </React.Fragment>
              );
            })}

            <svg className={`dag-c1-edges ${hasFocus ? 'has-focus' : ''}`}>
              <defs>
                <marker id="c1-board-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                  <path d="M0,0 L10,5 L0,10 z" fill="currentColor" />
                </marker>
              </defs>
              {edges.map(e => (
                <path key={e.id} d={e.d} className={`${e.isGate ? 'gates' : ''} from-${e.fromStatus} ${e.selectedHit ? 'is-selected' : ''}`} markerEnd="url(#c1-board-arrow)" />
              ))}
            </svg>

            {wps.map(wp => {
              const pos = layout.positions[wp.id]; if (!pos) return null;
              const isSel = selected === wp.id;
              const isNb  = !isSel && neighborSet.has(wp.id);
              const cls = ['dag-c1-node', wp.status, isSel && 'is-selected', isNb && 'is-neighbor'].filter(Boolean).join(' ');
              const onClk = () => setSelected(s => s === wp.id ? null : wp.id);
              return (
                <button key={wp.id} className={cls} style={{ left: pos.x, top: pos.y }} onClick={onClk}>
                  <div className="nhead">
                    <span className="nid">{wp.id}</span>
                    <span className="nbadge">{C1_STATUS_BADGE[wp.status] || (wp.status || '').toUpperCase()}</span>
                  </div>
                  <div className="ntitle">{wp.title}</div>
                  <div className="nmeta">
                    <span className="repo-tag">{wp.repo || '—'}</span>
                    {wp.gate && <span className="gate-mark">&#x25c6; {wp.gate}</span>}
                  </div>
                </button>
              );
            })}

            {gates.map(g => {
              const pos = layout.positions[g.id]; if (!pos) return null;
              const isSel = selected === g.id;
              const isNb  = !isSel && neighborSet.has(g.id);
              const cls = ['dag-c1-node', 'gate', g.status, isSel && 'is-selected', isNb && 'is-neighbor'].filter(Boolean).join(' ');
              const onClk = () => setSelected(s => s === g.id ? null : g.id);
              return (
                <button key={g.id} className={cls} style={{ left: pos.x, top: pos.y }} onClick={onClk}>
                  <span className="glock-chip">{C1_GATE_GLYPH[g.status] || '◆'}</span>
                  <span className="nid">&#x25c6; {g.id}</span>
                  <div className="gate-title">{g.label}</div>
                  <div className="gate-sub">{g.status} &middot; {g.wp}</div>
                </button>
              );
            })}

            {selNode && (
              <div className="dag-c1-detail">
                <div className="dp-head">
                  <div className="dp-id">{selNode.kind === 'gate' ? `◆ ${selNode.id}` : selNode.id}</div>
                  <button type="button" className="dp-close" onClick={() => setSelected(null)} title="Clear selection (Esc)" aria-label="Clear selection">&times;</button>
                </div>
                <div className="dp-title">{selNode.kind === 'gate' ? selNode.label : selNode.title}</div>
                {selNode.kind === 'wp' && (
                  <>
                    <div className="dp-row">
                      <span className="wp-status-cell"><span className={`dot ${selNode.status}`}></span>{selNode.status}</span>
                      <span className={`tag ${REPO_TAG_CLASS[selNode.repo] || ''}`}>{selNode.repo || '—'}</span>
                      {selNode.gate && <span className="tag tag-deal">&#x25c6; {selNode.gate}</span>}
                    </div>
                    {(selNode.deps || []).length > 0 && <div className="dp-deps">needs: {selNode.deps.join(' · ')}</div>}
                    {selNode.status !== 'done' && (
                      <div className="dp-actions">
                        <button className="btn btn-sm" onClick={() => onCopy(selNode)}><Icon name="copy" size={11} /> Copy</button>
                        <button className="btn btn-sm is-primary" onClick={() => onStart(selNode)} title={inShell ? "Send this WP's brief to your Chi" : 'Copy-prompt path'}><Icon name="play" size={10} /> Start</button>
                      </div>
                    )}
                  </>
                )}
                {selNode.kind === 'gate' && (
                  <>
                    <div className="dp-row">
                      <span className={`gate ${selNode.status === 'passed' ? 'passed' : ''}`}>{selNode.status === 'passed' ? '✓ passed' : '◌ pending'}</span>
                      <span style={{ fontSize: 11, color: 'var(--fg-muted)' }}>owned by {selNode.wp}</span>
                    </div>
                    <div className="dp-deps">Every dependent waits for this gate.</div>
                  </>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ─────── App root ─────── */
    function App({ art }) {
      const [layout,   setLayout]   = useState('mission-control');
      const [filter,   setFilter]   = useState('all');
      const [selected, setSelected] = useState((DATA.wps[0] || {}).id);
      const [toast,    setToast]    = useState(null);
      const [paletteOpen, setPaletteOpen] = useState(false);
      // Picker modal state (WP-23). null when closed; otherwise { kind:
      // 'subplan'|'init', action }. WP-23 pickers collect action arguments;
      // they live alongside paletteOpen so the palette can close + the picker
      // open in one flow (palette → modal → submit → dispatch). Engine choice
      // is NOT collected here (Round 7 / WP-25R) — the shell's New-Session
      // dialog (WP-27) handles engine + chat/terminal + cwd as part of its
      // own consent surface, opened by art.openSessionDialog.
      const [picker, setPicker] = useState(null);
      const inShell = art.inShell;

      useEffect(() => {
        art.publishState && art.publishState('board', { layout, filter, selected });
      }, [layout, filter, selected, art]);

      // ⌘K / Ctrl-K opens the palette globally.
      useEffect(() => {
        const onKey = (e) => {
          const meta = e.metaKey || e.ctrlKey;
          if (meta && (e.key === 'k' || e.key === 'K')) {
            e.preventDefault();
            setPaletteOpen(o => !o);
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      // Pin-on-first-mount (G8). Idempotent via localStorage — the shell handles
      // idempotency at its end too, but this guard avoids re-posting on every reload.
      useEffect(() => {
        if (!inShell || !art.pin) return;
        const KEY = 'groundwork-board:pinned';
        try {
          if (!localStorage.getItem(KEY)) {
            art.pin();
            localStorage.setItem(KEY, '1');
          }
        } catch (e) { /* storage blocked — let the shell dedupe */ }
      }, [inShell, art]);

      const flash = (m) => { setToast(m); setTimeout(() => setToast(null), 1800); };

      const onCopy = (wp) => {
        const text = briefFor(wp);
        try { navigator.clipboard.writeText(text); } catch (e) {}
        flash(`Copied ${wp.id} brief`);
      };
      const planTitle = META.title || DATA.plan?.title || 'plan';

      /* flashResult — unified result→toast handler for openSessionDialog.
         Result shape from WP-27:
           · { ok: true, kind: 'chat', threadId }       → "Started <label> session"
           · { ok: true, kind: 'terminal', paneId }     → "Started <label> in terminal"
           · { ok: false, reason: 'cancelled' }         → "Cancelled — <label> not started"
           · { ok: false, reason: <anything else> }     → caller does clipboard floor
         Returns true if we handled it (success or explicit cancel); false if
         the caller should fall through to clipboard. */
      const flashResult = (label, res) => {
        if (res && res.ok) {
          flash(res.kind === 'terminal' ? `Started ${label} in terminal` : `Started ${label} session`);
          return true;
        }
        if (res && res.reason === 'cancelled') {
          flash(`Cancelled — ${label} not started`);
          return true;
        }
        return false;
      };

      const onStart = async (wp) => {
        const text = briefFor(wp);
        const label = `${wp.id} — ${wp.title}`;
        // In-shell: round-trip to art.openSessionDialog (WP-27) — the shell's
        // New-Session dialog opens pre-filled with the brief, user picks
        // chat/terminal + engine + cwd + clicks Start. Clipboard is the floor
        // when the verb is absent / dialog cancelled / standalone.
        if (inShell && art.openSessionDialog) {
          const res = await art.openSessionDialog({ initialPrompt: text, title: label, source: 'wp-card' });
          if (flashResult(wp.id, res)) return;
        }
        try { navigator.clipboard.writeText(text); } catch (e) {}
        flash(inShell ? `Copied ${wp.id} brief (verb unavailable)` : `Outside Ikenga → copied ${wp.id} brief`);
      };

      // Kickoff (WP-20) — seeds the orchestrator brief for the whole plan.
      // Round 7 (WP-25R): no TargetPicker pre-step — the New-Session dialog
      // (WP-27) is the consent + target-choice surface. One click → dialog
      // opens pre-filled with the orchestrator brief.
      const onKickoff = async () => {
        const brief = buildOrchestratorBrief(META, DATA);
        if (inShell && art.openSessionDialog) {
          const res = await art.openSessionDialog({
            initialPrompt: brief,
            title: `${planTitle} orchestrator`,
            source: 'board',
          });
          if (flashResult('orchestrator', res)) return;
        }
        try { navigator.clipboard.writeText(brief); } catch (e) {}
        flash(inShell ? 'Verb unavailable → orchestrator brief copied' : 'Outside Ikenga → orchestrator brief copied');
      };

      /* dispatchAction (WP-21 core, extended for WP-23). Clipboard fallback is the
         unconditional floor:
           - write-actions  (mint)   → art.openSessionDialog (Round 7)
           - read-actions   (attach) → art.sendToActiveSession
         `extraMeta` carries argument-picker values (archetype/topic/ref for
         subplan; target_folder/profile/goal for init) — they're merged over META
         before substituteAction resolves the seeded + standalone forms, so the
         {placeholder} tokens fill from the form rather than the META fallbacks.
         The standalone slash form is always what hits the clipboard so a user can
         drop it into any chat surface. */
      const dispatchAction = async (action, extraMeta) => {
        const meta = extraMeta ? { ...META, ...extraMeta } : META;
        const seeded = substituteAction(action.seededForm, meta, DATA.plan);
        const standalone = substituteAction(action.standaloneForm, meta, DATA.plan);
        const title = `groundwork · ${action.label}`;
        let result = { ok: false, reason: 'no-verb' };
        try {
          if (action.surface === 'new-session' && art.openSessionDialog) {
            result = await art.openSessionDialog({ initialPrompt: seeded, title, source: 'palette' });
          } else if (action.surface === 'active-session' && art.sendToActiveSession) {
            result = await art.sendToActiveSession({ prompt: seeded, source: 'palette' });
          }
        } catch (e) { result = { ok: false, reason: 'threw' }; }

        if (result && result.ok) {
          flash(action.surface === 'new-session'
            ? (result.kind === 'terminal' ? `Started ${action.label} in terminal` : `Seeded new chat → ${action.label}`)
            : `Sent to active session → ${action.label}`);
          return;
        }
        if (result && result.reason === 'cancelled') {
          flash(`Cancelled — ${action.label} not started`);
          return;
        }
        // Floor: clipboard the standalone slash form so the user can paste anywhere.
        try { navigator.clipboard.writeText(standalone); } catch (e) {}
        const why = (result && result.reason) || 'fallback';
        flash(`Copied ${standalone}  · ${inShell ? `(${why})` : 'standalone'}`);
      };

      /* onPaletteFire (WP-23 + Round 7). Branching map:
           · needsPicker: 'subplan' | 'init' → arg-picker (archetype/topic/ref
             or target_folder/profile/goal). Submit → dispatchAction with the
             values merged into META → openSessionDialog opens pre-filled.
           · surface: 'new-session'          → dispatchAction → openSessionDialog
             pre-filled (research / design / review / orchestrate).
           · surface: 'active-session'       → dispatchAction → sendToActiveSession
             (clarify / status / refresh-board). */
      const onPaletteFire = (action) => {
        if (action.disabled) return;
        setPaletteOpen(false);
        if (action.needsPicker === 'subplan' || action.needsPicker === 'init') {
          setPicker({ kind: action.needsPicker, action }); return;
        }
        dispatchAction(action);
      };

      // onPickerSubmit (WP-23) — close the picker, then dispatch with the
      // collected args merged over META. Engine/chat-vs-terminal choice lives
      // in the New-Session dialog (WP-27), not the picker.
      const onPickerSubmit = (values) => {
        const cur = picker;
        setPicker(null);
        if (!cur || !cur.action) return;
        dispatchAction(cur.action, values);
      };

      const counts = useMemo(() => DATA.wps.reduce((a, w) => (a[w.status] = (a[w.status]||0)+1, a), {}), []);
      const done = counts.done || 0;

      // Resolve the selected WP object + any sub-plan that references it.
      // Both feed the WpDetailCard inside the rail.
      const selectedWp = useMemo(() => DATA.wps.find(w => w.id === selected) || null, [selected]);
      const subplan = useMemo(() => {
        if (!selectedWp || !Array.isArray(DATA.subplans)) return null;
        return DATA.subplans.find(sp => sp.ref === selectedWp.id) || null;
      }, [selectedWp]);
      const onClear = () => setSelected(null);

      return (
        <div className="shell">
          {/* Single scroll area wraps page-head + grid so the hero scrolls
              away naturally; the sticky thead inside the table pins to the
              top of this main element. Round 8 layout pass. */}
          <main className="scroll-area">
            <PageHead
              data={DATA} meta={META}
              filter={filter} setFilter={setFilter} counts={counts}
              layout={layout} setLayout={setLayout}
              inShell={inShell} done={done}
              onKickoff={onKickoff}
              onOpenPalette={() => setPaletteOpen(true)}
            />
            {layout === 'mission-control' ? <MissionControl   data={DATA} selected={selected} setSelected={setSelected} selectedWp={selectedWp} subplan={subplan} filter={filter} onCopy={onCopy} onStart={onStart} onClear={onClear} inShell={inShell} /> :
             layout === 'kanban'          ? <Kanban           data={DATA} selected={selected} setSelected={setSelected} selectedWp={selectedWp} subplan={subplan}                onCopy={onCopy} onStart={onStart} onClear={onClear} inShell={inShell} /> :
                                            <DagHierarchical  data={DATA} selected={selected} setSelected={setSelected} selectedWp={selectedWp} subplan={subplan}                onCopy={onCopy} onStart={onStart} onClear={onClear} inShell={inShell} />
            }
          </main>
          <footer className="page-foot">
            <span className="chip-carve">▽▽▽</span>
            <span>◆ = freeze gate · click a row/card to select</span>
            <span style={{ marginLeft: 'auto' }}>
              {META.refreshed ? <>refreshed {META.refreshed}</> : <>never refreshed — run <code>groundwork refresh-board</code></>}
            </span>
          </footer>
          <Toast msg={toast} />
          <CommandPalette
            open={paletteOpen}
            onClose={() => setPaletteOpen(false)}
            onFire={onPaletteFire}
            actions={ACTIONS}
          />
          {/* Picker modals — routed by picker.kind. Submit → onPickerSubmit
              (which dispatches with the collected values via openSessionDialog);
              Cancel / ESC / backdrop → setPicker(null) (no dispatch). WP-23
              covers subplan + init. Round 7 (WP-25R) removed the target picker:
              the New-Session dialog (WP-27) is the engine + chat/terminal +
              cwd consent surface. */}
          {picker && picker.kind === 'subplan' && (
            <SubplanPicker onClose={() => setPicker(null)} onSubmit={onPickerSubmit} />
          )}
          {picker && picker.kind === 'init' && (
            <InitPicker onClose={() => setPicker(null)} onSubmit={onPickerSubmit} />
          )}
        </div>
      );
    }

    window.__groundwork_bridge_polyfill__.init().then((art) =>
      ReactDOM.createRoot(document.getElementById('root')).render(<App art={art} />));
  })();
  </script>
</body>
</html>
