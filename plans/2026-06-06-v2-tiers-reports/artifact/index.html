  <!--
    Bridge polyfill — host-context handshake ONLY (no in-page switcher).
    The shell pushes { theme, mode, density } when the user changes app
    preferences; we mirror onto <html>. Standalone, this is a no-op.
  -->
  <script>
  window.__bridge__ = {
    init: function () {
      const inShell = !!(window.parent && window.parent !== window);
      function post(kind, payload) { try { if (inShell) window.parent.postMessage({ __iyke: true, kind, payload }, '*'); } catch (e) {} }
      window.addEventListener('message', (ev) => {
        const m = ev.data;
        if (!m || !m.__iyke || m.kind !== 'host-context') return;
        const ctx = m.payload || {};
        if (ctx.theme)   document.documentElement.setAttribute('data-theme', ctx.theme);
        if (ctx.mode)    document.documentElement.setAttribute('data-mode',  ctx.mode);
        if (ctx.density) document.documentElement.setAttribute('data-density', ctx.density);
      });
      return Promise.resolve({
        inShell,
        publishState: (key, value) => post('state', { key, value }),
      });
    }
  };
  </script>

              <tr><td><span className="tag tag-warn">gap</span></td><td className="mono">G-NN</td><td className="mono">G-12</td><td>review pass — folded into a Round</td></tr>
              <tr><td><span className="tag tag-tint">work package</span></td><td className="mono">WP-NN</td><td className="mono">WP-05, WP-05a</td><td>orchestrate — derived from 05 sections</td></tr>
              <tr><td><span className="tag tag-system">freeze gate</span></td><td className="mono">G-&lt;NAME&gt;</td><td className="mono">G-SCHEMA, G-VERB</td><td>orchestrate — declared in plan §Freeze gates</td></tr>
              <tr><td><span className="tag tag-deal">design</span></td><td className="mono">D-NN</td><td className="mono">D-01</td><td>design pass — one per <code>designs/*.html</code> produced</td></tr>
            </tbody>
          </table>
        </section>
      </>
    );

    const Board = () => (
      <>
        <section>
          <span className="eyebrow"><span className="eyebrow-dot"></span>The plan-board artifact</span>
          <h2>A separate artifact — at <code>artifact/board.html</code></h2>
          <p>
            The <em>living spec</em> (this page, at <code>artifact/index.html</code>) is the conceptual walkthrough — what the plan is, how the spine works, what each action does, the phases/decisions/risks. The <em>tracking board</em> is the operational dashboard you return to during a run: dense WP table with status, freeze gates, the decisions log + design coverage + research freshness in the right rail.
          </p>
          <p className="muted">
            <a href="./board.html" target="_top">Open the tracking board →</a> in a new view to see this plan's WPs on the same canonical layout the skill ships. <code>refresh-board</code> writes into its <code>board-data</code> fence; the embedded mock-data block is the fallback before the first refresh.
          </p>
        </section>

        <section>
          <h3>Layouts — Mission Control default + Wave Board toggle</h3>
          <p>
            Two layouts, same data, toggle between them. Mission Control is the default — status-first, dense WP table + right rail carrying cross-cutting state (decisions, design coverage, research freshness). Wave Board is the toggle — waves as columns, cards flow left-to-right, gates as checkpoint chips.
          </p>
          <table className="ikenga-table">
            <thead><tr><th>Surface</th><th>Layout</th><th>Where</th></tr></thead>
            <tbody>
              <tr><td>Canonical template</td><td>Mission Control + Wave Board toggle</td><td className="mono"><code>.claude/skills/groundwork/profiles/_shared/board/index.html</code></td></tr>
            </tbody>
          </table>
        </section>

        <section>
          <h3>Per-WP actions</h3>
          <table className="ikenga-table">
            <thead><tr><th>Action</th><th>Standalone (any browser)</th><th>In Ikenga shell</th></tr></thead>
            <tbody>
              <tr>
                <td><strong>Copy brief</strong></td>
                <td><span className="tag tag-deal">✓ copies WP brief to clipboard</span></td>
                <td><span className="tag tag-deal">✓ same</span></td>
              </tr>
              <tr>
                <td><strong>Start session</strong></td>
                <td><span className="tag">falls back to copy</span></td>
                <td><span className="tag tag-tint">opens the New-Session dialog pre-filled</span></td>
              </tr>
            </tbody>
          </table>
        </section>

        <section>
          <h3>Composition with <code>ikenga-artifact-builder</code></h3>
          <p>
            The board is itself a proper Ikenga artifact (with <code>ikenga-manifest</code>, <code>capabilities</code>, mock-data fallback). <code>refresh-board</code> composes <code>ikenga-artifact-builder</code> when it's installed; otherwise it copies the self-contained fallback template and injects the live data into the fenced JSON blocks. <strong>Soft dependency, never hard.</strong>
          </p>
        </section>
      </>
    );

    /* ═════════ Volatile tabs (RENDER FROM spec-state JSON FENCE) ═════════ */

    const Phasing = () => {
      const phases = SPEC_STATE.phases || [];
      if (phases.length === 0) {
        return (
          <div className="empty-state">
            <h3>No phase data yet</h3>
            <p>Run <code>groundwork refresh-living-spec</code> to populate this tab from <code>05-tracking.md</code> + WP statuses in <code>.groundwork.json</code>.</p>
          </div>
        );
      }
      const statusTag = (p) => {
        if (p.status === 'shipped') return <span className="tag tag-deal">shipped</span>;
        if (p.status === 'in_progress' || p.status === 'active') return <span className="tag tag-tint">in progress</span>;
        if (p.status === 'stretch') return <span className="tag tag-warn">stretch · active</span>;
        if (p.status === 'queued')  return <span className="tag tag-tint">queued</span>;
        if (p.status === 'stub')    return <span className="tag">stub</span>;
        return <span className="tag">{p.status}</span>;
      };
      const statusValue = (p) => {
        if (p.status === 'shipped')     return 'Shipped';
        if (p.status === 'in_progress' || p.status === 'active') return 'In progress';
        if (p.status === 'stretch')     return 'Stretch';
        if (p.status === 'queued')      return 'Queued';
        if (p.status === 'stub')        return 'Stub';
        return p.status;
      };
      const statusDeltaClass = (p) => p.status === 'shipped' ? 'up' : '';
      return (
        <>
          <section>
            <span className="eyebrow"><span className="eyebrow-dot"></span>Phasing</span>
            <h2>{phases.length} phases · current state</h2>
            <p className="muted">Generated from <code>.groundwork.json</code> + <code>05-tracking.md</code> by <code>refresh-living-spec</code>. Full WP detail in <code><a href="../05-tracking.md">05-tracking.md</a></code> + <code><a href="./board.html" target="_top">board.html</a></code>.</p>
            <div className="kpis">
              {phases.map(p => (
                <div key={p.id} className="kpi">
                  <div className="kpi-label">{p.id} · {p.title}</div>
                  <div className="kpi-value">{statusValue(p)}</div>
                  <div className={`kpi-delta ${statusDeltaClass(p)}`}>
                    {p.shipped_at ? `shipped ${p.shipped_at}` : p.next_pull ? `next pull · ${p.next_pull}` : '—'}
                  </div>
                </div>
              ))}
            </div>
          </section>

          <section>
            <h3>Per-phase notes</h3>
            <table className="ikenga-table">
              <thead><tr><th>Phase</th><th>Title</th><th>Status</th><th>Detail</th></tr></thead>
              <tbody>
                {phases.map(p => (
                  <tr key={p.id}>
                    <td className="mono">{p.id}{p.round ? <span style={{ color: 'var(--fg-faint)' }}> · R{p.round}</span> : null}</td>
                    <td>{p.title}</td>
                    <td>{statusTag(p)}{p.shipped_at && <div className="mono" style={{ fontSize: 11, color: 'var(--fg-faint)', marginTop: 4 }}>{p.shipped_at}</div>}{p.next_pull && <div className="mono" style={{ fontSize: 11, color: 'var(--primary)', marginTop: 4 }}>next: {p.next_pull}</div>}</td>
                    <td style={{ color: 'var(--fg-muted)', fontSize: 'var(--text-body-sm)', lineHeight: 1.55 }}>{p.note}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </section>
        </>
      );
    };

    const Decisions = () => {
      const rounds = SPEC_STATE.decisions || [];
      if (rounds.length === 0) {
        return (
          <div className="empty-state">
            <h3>No decisions yet</h3>
            <p>Run <code>groundwork refresh-living-spec</code> to extract rounds from <code>04-discussion.md</code>.</p>
          </div>
        );
      }
      return (
        <>
          <section>
            <span className="eyebrow"><span className="eyebrow-dot"></span>Decision log</span>
            <h2>{rounds.length} rounds, newest first</h2>
            <p>The full log lives in <code><a href="../04-discussion.md">04-discussion.md</a></code>. Each round's summary below is regenerated from the <code>spec-state</code> fence.</p>
          </section>

          <section>
            {rounds.map(r => (
              <div key={r.round} className="round-entry">
                <div className="round-entry-head">
                  <span className="round-entry-num">Round {r.round}</span>
                  <span className="round-entry-title">{r.title}</span>
                  <span className="round-entry-date">{r.date}</span>
                </div>
                <div className="round-entry-body">
                  <p>{r.summary}</p>
                </div>
              </div>
            ))}
          </section>
        </>
      );
    };

    const Risks = () => {
      const risks = SPEC_STATE.risks || [];
      if (risks.length === 0) {
        return (
          <div className="empty-state">
            <h3>No risks tracked yet</h3>
            <p>Run <code>groundwork refresh-living-spec</code> to extract risks from <code>01-plan.md §Risks</code>.</p>
          </div>
        );
      }
      const renderTitle = (t) => {
        if (!t) return null;
        const parts = String(t).split(/(`[^`]+`)/g);
        return parts.map((p, i) => p.startsWith('`') && p.endsWith('`')
          ? <code key={i}>{p.slice(1, -1)}</code>
          : <React.Fragment key={i}>{p}</React.Fragment>);
      };
      const sevTag = (sev) => {
        if (sev === 'critical')  return <span className="tag tag-warn">critical</span>;
        if (sev === 'important') return <span className="tag tag-warn">important</span>;
        if (sev === 'nice')      return <span className="tag tag-system">nice-to-have</span>;
        return <span className="tag">{sev || 'risk'}</span>;
      };
      return (
        <>
          <section>
            <span className="eyebrow"><span className="eyebrow-dot"></span>Risks + mitigations</span>
            <h2>{risks.length} tracked risks</h2>
            <p>Pulled from <code><a href="../01-plan.md#risks--alternatives">01-plan §Risks</a></code> via the <code>spec-state</code> fence. Each carries a mitigation; <code>source</code> points to the authoring round.</p>
          </section>

          <section>
            <div className="risk-grid">
              {risks.map((r, i) => (
                <div key={i} className="risk-card">
                  <div className="risk-card-head">
                    <span className="risk-card-title">{renderTitle(r.title)}</span>
                    {sevTag(r.severity)}
                  </div>
                  <div className="risk-card-body">
                    <p style={{ margin: '0 0 6px' }}><strong>Mitigation:</strong> {r.mitigation}</p>
                    {r.source && <p className="mono" style={{ margin: 0, fontSize: 11, color: 'var(--fg-faint)' }}>source · {r.source}</p>}
                  </div>
                </div>
              ))}
            </div>
          </section>
        </>
      );
    };

    /* ═════════ App root ═════════ */
    function App({ art }) {
      const [tab, setTab] = useState('overview');
      const inShell = art.inShell;

      useEffect(() => { art.publishState && art.publishState('spec', { tab }); }, [tab, art]);

      useEffect(() => {
        const handler = (e) => setTab(e.detail);
        window.addEventListener('jump-tab', handler);
        return () => window.removeEventListener('jump-tab', handler);
      }, []);

      const RENDER = {
        overview: <Overview />, spine: <Spine />, actions: <Actions />, profiles: <Profiles />,
        state: <State />, board: <Board />, phasing: <Phasing />, decisions: <Decisions />, risks: <Risks />,
      };

      return (
        <div className="shell">
          <header className="page-head">
            <div className="page-head-eyebrow">
              <span className="eyebrow"><span className="eyebrow-dot"></span>plans/2026-06-06-v2-tiers-reports · living spec</span>
              <span className={`host-badge ${inShell ? 'in-shell' : ''}`} style={{ marginLeft: 'auto' }}>{inShell ? 'in shell' : 'standalone'}</span>
            </div>
            <h1 className="plan-title">v2-tiers-reports</h1>
            <p className="plan-lede">
              Ship TaLi v2: full report suite (P&L, category, inventory valuation, debt aging) + subscription tiers (Free/Pro/Business), Paystack paywall, rate limiting, and scheduled reports — within PythonAnywhere free-tier limits.
            </p>
          </header>

          <nav className="tabs" role="tablist">
            {TABS.map(t => (
              <button key={t.id} className={`tab ${tab === t.id ? 'is-on' : ''}`} onClick={() => setTab(t.id)} role="tab" aria-selected={tab === t.id}>
                <Icon name={t.icon} size={14} />
                {t.label}
                {t.count != null && <span className="tab-count">{t.count}</span>}
              </button>
            ))}
          </nav>

          <main className="content">
            <div className="content-inner">{RENDER[tab]}</div>
          </main>

          <footer className="page-foot">
            <span className="chip-carve">▽▽▽</span>
            <span>living spec · run <code>groundwork refresh-living-spec</code> to update Phasing / Decisions / Risks</span>
            <span style={{ marginLeft: 'auto' }}>spine_version <strong>1</strong> · profile <strong>software</strong></span>
          </footer>
        </div>
      );
    }

    window.__bridge__.init().then((art) =>
      ReactDOM.createRoot(document.getElementById('root')).render(<App art={art} />));
  })();
  </script>
</body>
</html>
