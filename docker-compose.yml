version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: tali-mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-tali}
      MYSQL_USER: ${DB_USER:-tali_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-tali_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: tali-flask-app
    restart: always
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER:-tali_user}
      - DB_PASSWORD=${DB_PASSWORD:-tali_password}
      - DB_NAME=${DB_NAME:-tali}
      - FLASK_ENV=development
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

volumes:
  mysql_data:
